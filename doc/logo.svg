<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
   width="200"
   height="200"
   viewBox="0 0 200 200"
   version="1.1"
   sodipodi:docname="logo.svg"
   xmlns:sodipodi="http://sodipodi.sourceforge.net/DTD/sodipodi-0.dtd"
   xmlns="http://www.w3.org/2000/svg"
   xmlns:svg="http://www.w3.org/2000/svg">
  <sodipodi:namedview
     pagecolor="#ffffff"
     bordercolor="#666666"
     borderopacity="1.0"/>
  <defs>
    <linearGradient
       id="limeGrad"
       x1="-22.75"
       y1="-22.75"
       x2="-22.75"
       y2="22.75"
       gradientUnits="userSpaceOnUse">
      <stop
         offset="0%"
         style="stop-color:#98ff98"/>
      <stop
         offset="100%"
         style="stop-color:#32cd32"/>
    </linearGradient>
  </defs>
  <!-- Background Glow -->
  <circle
     cx="100"
     cy="100"
     r="80"
     fill="#2ecc71"
     fill-opacity="0.05"/>
  <!-- Glass Shadow -->
  <ellipse
     cx="100"
     cy="170"
     rx="30"
     ry="5"
     fill="#000"
     fill-opacity="0.1"/>
  <!-- Highball Glass Body -->
  <path
     d="M70 30 L130 30 L120 170 L80 170 Z"
     fill="none"
     stroke="#2ecc71"
     stroke-width="2"
     style="fill:none" />
  <!-- Liquid (Mojito) -->
  <path
     d="M 73,70 127,70 120,170 H 80 Z"
     fill="#2ecc71"
     fill-opacity="0.15"
     sodipodi:nodetypes="ccccc" />
  <!-- Monitoring Pulse/Signal -->
  <path
     d="M 50,110 80,103 95,80 108,126 115,92 l 35,8"
     fill="none"
     stroke="#27ae60"
     stroke-width="4"
     stroke-linecap="round"
     stroke-linejoin="round"
     sodipodi:nodetypes="cccccc" />
  <!-- Lime Slice -->
  <g
     transform="matrix(0.8,0,0,0.8,127,29)">
    <circle
       cx="0"
       cy="0"
       r="22"
       fill="url(#limeGrad)"
       stroke="#228b22"
       stroke-width="1.5"
       style="fill:url(#limeGrad)" />
    <circle
       cx="0"
       cy="0"
       r="18"
       fill="none"
       stroke="#ffffff"
       stroke-width="1"
       stroke-dasharray="2, 4"/>
    <line
       x1="-15"
       y1="0"
       x2="15"
       y2="0"
       stroke="#228b22"
       stroke-width="0.5"/>
    <line
       x1="0"
       y1="-15"
       x2="0"
       y2="15"
       stroke="#228b22"
       stroke-width="0.5"/>
    <line
       x1="-10.6"
       y1="-10.6"
       x2="10.6"
       y2="10.6"
       stroke="#228b22"
       stroke-width="0.5"/>
    <line
       x1="10.6"
       y1="-10.6"
       x2="-10.6"
       y2="10.6"
       stroke="#228b22"
       stroke-width="0.5"/>
  </g>
  <!-- Ice Cubes (Binary Data Representation) -->
  <rect
     x="85"
     y="130"
     width="12"
     height="12"
     rx="2"
     fill="#fff"
     fill-opacity="0.3"
     transform="rotate(15, 91, 136)"
     style="fill:#ffffff;fill-opacity:0.75" />
  <rect
     x="105"
     y="145"
     width="10"
     height="10"
     rx="1"
     fill="#fff"
     fill-opacity="0.2"
     transform="rotate(-10, 110, 150)"
     style="fill:#ffffff;fill-opacity:0.6" />
</svg>
